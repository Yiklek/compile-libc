name: Compile libc/libm

on:
  workflow_dispatch:
    inputs:
      libc_type:
        description: 'libc type (glibc, musl, newlib)'
        required: true
        default: 'musl'
        type: choice
        options:
          - musl
          - glibc
          - newlib
      version:
        description: 'Version (e.g. 1.2.5 for musl, 2.39 for glibc, 4.3.0 for newlib)'
        required: true
        default: '1.2.5'
      target_arch:
        description: 'Target architecture'
        required: true
        default: 'x86_64'
        type: choice
        options:
          - x86_64
          - aarch64
          - i686
          - riscv64
      target_os:
        description: 'Target OS'
        required: true
        default: 'linux'
        type: choice
        options:
          - linux
          - none
      release:
        description: 'Create GitHub Release'
        required: false
        default: 'false'
        type: boolean

env:
  WORKSPACE: ${{ github.workspace }}
  INSTALL_DIR: ${{ github.workspace }}/install

jobs:
  compile:
    name: Build ${{ inputs.libc_type }}-${{ inputs.version }}-${{ inputs.target_arch }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc \
            g++ \
            make \
            curl \
            wget \
            git \
            patch \
            autoconf \
            automake \
            libtool \
            binutils \
            texinfo \
            bison \
            flex \
            gawk \
wc \
            sed \
            grep

      - name: Setup cross-compilation for aarch64
        if: inputs.target_arch == 'aarch64'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX=aarch64-linux-gnu-g++" >> $GITHUB_ENV
          echo "AR=aarch64-linux-gnu-gcc-ar" >> $GITHUB_ENV
          echo "RANLIB=aarch64-linux-gnu-gcc-ranlib" >> $GITHUB_ENV
          echo "STRIP=aarch64-linux-gnu-strip" >> $GITHUB_ENV
          echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV

      - name: Setup cross-compilation for i686
        if: inputs.target_arch == 'i686'
        run: |
          sudo apt-get install -y gcc-multilib g++-multilib
          echo "CFLAGS=-m32" >> $GITHUB_ENV
          echo "CXXFLAGS=-m32" >> $GITHUB_ENV
          echo "LDFLAGS=-m32" >> $GITHUB_ENV

      - name: Setup cross-compilation for riscv64
        if: inputs.target_arch == 'riscv64'
        run: |
          sudo apt-get install -y gcc-riscv64-linux-gnu g++-riscv64-linux-gnu
          echo "CC=riscv64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX=riscv64-linux-gnu-g++" >> $GITHUB_ENV
          echo "AR=riscv64-linux-gnu-gcc-ar" >> $GITHUB_ENV
          echo "RANLIB=riscv64-linux-gnu-gcc-ranlib" >> $GITHUB_ENV
          echo "STRIP=riscv64-linux-gnu-strip" >> $GITHUB_ENV
          echo "CROSS_COMPILE=riscv64-linux-gnu-" >> $GITHUB_ENV

      # glibc 依赖库编译阶段
      - name: Compile GMP (required for glibc)
        if: inputs.libc_type == 'glibc'
        run: |
          GMP_VERSION=6.3.0
          echo "GMP_VERSION=${GMP_VERSION}" >> $GITHUB_ENV

          # Download GMP source
          wget https://gmplib.org/download/gmp/gmp-${GMP_VERSION}.tar.xz
          tar xJf gmp-${GMP_VERSION}.tar.xz

          # Configure and build
          mkdir -p ${INSTALL_DIR}
          cd gmp-${GMP_VERSION}
          ./configure --prefix=${INSTALL_DIR}/gmp \
            --disable-shared \
            --enable-static
          make -j$(nproc)
          make install

          echo "GMP installed successfully"
          ls -la ${INSTALL_DIR}/gmp/lib/

      - name: Compile MPFR (required for glibc)
        if: inputs.libc_type == 'glibc'
        run: |
          MPFR_VERSION=4.2.1
          echo "MPFR_VERSION=${MPFR_VERSION}" >> $GITHUB_ENV

          # Download MPFR source
          wget https://www.mpfr.org/mpfr-current/mpfr-${MPFR_VERSION}.tar.gz
          tar xzf mpfr-${MPFR_VERSION}.tar.gz

          # Configure and build with GMP
          cd mpfr-${MPFR_VERSION}
          ./configure --prefix=${INSTALL_DIR}/mpfr \
            --with-gmp=${INSTALL_DIR}/gmp \
            --disable-shared \
            --enable-static
          make -j$(nproc)
          make install

          echo "MPFR installed successfully"
          ls -la ${INSTALL_DIR}/mpfr/lib/

      - name: Compile MPC (required for glibc)
        if: inputs.libc_type == 'glibc'
        run: |
          MPC_VERSION=1.3.1
          echo "MPC_VERSION=${MPC_VERSION}" >> $GITHUB_ENV

          # Download MPC source
          wget https://ftp.gnu.org/gnu/mpc/mpc-${MPC_VERSION}.tar.gz
          tar xzf mpc-${MPC_VERSION}.tar.gz

          # Configure and build with GMP and MPFR
          cd mpc-${MPC_VERSION}
          ./configure --prefix=${INSTALL_DIR}/mpc \
            --with-gmp=${INSTALL_DIR}/gmp \
            --with-mpfr=${INSTALL_DIR}/mpfr \
            --disable-shared \
            --enable-static
          make -j$(nproc)
          make install

          echo "MPC installed successfully"
          ls -la ${INSTALL_DIR}/mpc/lib/

      # 主库编译阶段
      - name: Compile musl
        if: inputs.libc_type == 'musl'
        run: |
          VERSION=${{ inputs.version }}
          ARCH=${{ inputs.target_arch }}
          TARGET=${ARCH}-linux-musl

          # Download musl source
          wget https://musl.cc/release/${VERSION}/musl-${VERSION}.tar.gz || \
          wget https://musl.cc/${VERSION}/musl-${VERSION}.tar.gz
          tar xzf musl-${VERSION}.tar.gz
          cd musl-${VERSION}

          # Configure
          CONFIGURE_OPTS="--disable-debug --prefix=/usr/local --enable-wrapper=yes"
          if [ "$ARCH" = "aarch64" ]; then
            CONFIGURE_OPTS="$CONFIGURE_OPTS --target=aarch64-linux-musl --host=aarch64-linux-musl"
          elif [ "$ARCH" = "riscv64" ]; then
            CONFIGURE_OPTS="$CONFIGURE_OPTS --target=riscv64-linux-musl --host=riscv64-linux-musl"
          fi

          ./configure $CONFIGURE_OPTS

          # Compile
          make -j$(nproc)
          make install DESTDIR=$(pwd)/../output

          cd ..

          # Package
          ARTIFACT_NAME="musl-${VERSION}-${ARCH}.tar.gz"
          tar czf $ARTIFACT_NAME -C output .
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV

          # Verify libm
          if [ -f "output/usr/local/lib/libm.a" ] || [ -f "output/usr/local/lib/libm.so" ]; then
            echo "libm built successfully"
          else
            echo "Warning: libm not found"
          fi

      - name: Compile glibc with dependencies
        if: inputs.libc_type == 'glibc'
        run: |
          VERSION=${{ inputs.version }}
          ARCH=${{ inputs.target_arch }}

          # Download glibc source
          wget https://ftp.gnu.org/gnu/glibc/glibc-${VERSION}.tar.gz
          tar xzf glibc-${VERSION}.tar.gz
          cd glibc-${VERSION}

          # Create build directory
          mkdir build && cd build

          # Export library paths for dependencies
          export PATH=${INSTALL_DIR}/gmp/bin:${INSTALL_DIR}/mpfr/bin:${INSTALL_DIR}/mpc/bin:$PATH
          export LDFLAGS="-L${INSTALL_DIR}/gmp/lib -L${INSTALL_DIR}/mpfr/lib -L${INSTALL_DIR}/mpc/lib"
          export CPPFLAGS="-I${INSTALL_DIR}/gmp/include -I${INSTALL_DIR}/mpfr/include -I${INSTALL_DIR}/mpc/include"

          # Configure with math library support
          ../configure \
            --prefix=/usr \
            --disable-profile \
            --disable-werror \
            --enable-add-ons \
            --without-cvs \
            --with-binutils=${INSTALL_DIR}/gmp/bin \
            --with-headers=/usr/include

          # Compile with all components including math library
          make -j$(nproc) PARALLELMFLAGS="-j$(nproc)"
          make install DESTDIR=$(pwd)/../../output

          cd ../..

          # Verify libm was built
          echo "Checking for libm..."
          find output -name "libm.*" -type f

          # Package
          ARTIFACT_NAME="glibc-${VERSION}-${ARCH}.tar.gz"
          tar czf $ARTIFACT_NAME -C output .
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV

      - name: Compile newlib with libm
        if: inputs.libc_type == 'newlib'
        run: |
          VERSION=${{ inputs.version }}
          ARCH=${{ inputs.target_arch }}

          # Download newlib-nano source (includes libm)
          wget https://sourceware.org/pub/newlib/newlib-${VERSION}.tar.gz
          tar xzf newlib-${VERSION}.tar.gz

          # Determine target triplet
          if [ "$ARCH" = "riscv64" ]; then
            TARGET=riscv64-unknown-elf
            sudo apt-get install -y gcc-riscv64-unknown-elf
          elif [ "$ARCH" = "aarch64" ]; then
            TARGET=aarch64-none-elf
            sudo apt-get install -y gcc-aarch64-none-elf
          else
            TARGET=x86_64-unknown-none
          fi

          # Configure with libm support
          cd newlib-${VERSION}
          ./configure --target=$TARGET \
            --prefix=/usr/local \
            --enable-newlib-io-long-long \
            --enable-newlib-register-fp

          # Compile - newlib builds libm automatically
          make -j$(nproc)
          make install DESTDIR=$(pwd)/../output

          cd ..

          # Verify libm
          echo "Checking for libm..."
          find output -name "libm.*" -type f

          # Package
          ARTIFACT_NAME="newlib-${VERSION}-${ARCH}.tar.gz"
          tar czf $ARTIFACT_NAME -C output .
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}
          retention-days: 30

      - name: Create Release
        if: inputs.release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.libc_type }}-v${{ inputs.version }}-${{ inputs.target_arch }}
          name: ${{ inputs.libc_type }} ${{ inputs.version }} (${{ inputs.target_arch }})
          files: ${{ env.ARTIFACT_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Type**: ${{ inputs.libc_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Architecture**: ${{ inputs.target_arch }}" >> $GITHUB_STEP_SUMMARY
          echo "- **OS**: ${{ inputs.target_os }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifact**: ${{ env.ARTIFACT_NAME }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ inputs.libc_type }}" = "glibc" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Dependencies:**" >> $GITHUB_STEP_SUMMARY
            echo "- GMP: ${GMP_VERSION:-6.3.0}" >> $GITHUB_STEP_SUMMARY
            echo "- MPFR: ${MPFR_VERSION:-4.2.1}" >> $GITHUB_STEP_SUMMARY
            echo "- MPC: ${MPC_VERSION:-1.3.1}" >> $GITHUB_STEP_SUMMARY
          fi
