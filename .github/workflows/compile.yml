name: Compile libc/libm

on:
  workflow_dispatch:
    inputs:
      libc_type:
        description: 'libc type (glibc, musl, newlib)'
        required: true
        default: 'musl'
        type: choice
        options:
          - musl
          - glibc
          - newlib
      version:
        description: 'Version (e.g. 1.2.5 for musl, 2.39 for glibc, 4.3.0 for newlib)'
        required: true
        default: '1.2.5'
      target_arch:
        description: 'Target architecture'
        required: true
        default: 'x86_64'
        type: choice
        options:
          - x86_64
          - aarch64
          - i686
          - riscv64
      target_os:
        description: 'Target OS'
        required: true
        default: 'linux'
        type: choice
        options:
          - linux
          - none
      release:
        description: 'Create GitHub Release'
        required: false
        default: 'false'
        type: boolean

env:
  WORKSPACE: ${{ github.workspace }}
  INSTALL_DIR: ${{ github.workspace }}/install

jobs:
  compile:
    name: Build ${{ inputs.libc_type }}-${{ inputs.version }}-${{ inputs.target_arch }}
    runs-on: ${{ inputs.target_arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc \
            g++ \
            make \
            curl \
            wget \
            git \
            patch \
            autoconf \
            automake \
            libtool \
            binutils \
            texinfo \
            bison \
            flex \
            gawk


      # 主库编译阶段
      - name: Compile musl
        if: inputs.libc_type == 'musl'
        run: |
          VERSION=${{ inputs.version }}
          ARCH=${{ inputs.target_arch }}

          # Download musl source
          wget https://musl.cc/release/${VERSION}/musl-${VERSION}.tar.gz || \
          wget https://musl.cc/${VERSION}/musl-${VERSION}.tar.gz
          tar xzf musl-${VERSION}.tar.gz
          cd musl-${VERSION}

          # Configure (native build on matched architecture runner)
          ./configure --disable-debug --prefix=/usr/local --enable-wrapper=yes

          # Compile
          make -j$(nproc)
          make install DESTDIR=$(pwd)/../output

          cd ..

          # Package
          ARTIFACT_NAME="musl-${VERSION}-${ARCH}.tar.gz"
          tar czf $ARTIFACT_NAME -C output .
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV

          # Verify libm
          if [ -f "output/usr/local/lib/libm.a" ] || [ -f "output/usr/local/lib/libm.so" ]; then
            echo "libm built successfully"
          else
            echo "Warning: libm not found"
          fi

      - name: Compile glibc with dependencies
        if: inputs.libc_type == 'glibc'
        run: |
          VERSION=${{ inputs.version }}
          ARCH=${{ inputs.target_arch }}

          # Download glibc source
          wget https://ftp.gnu.org/gnu/glibc/glibc-${VERSION}.tar.gz
          tar xzf glibc-${VERSION}.tar.gz
          cd glibc-${VERSION}

          # Create build directory
          mkdir build && cd build
          CPPFLAGS="-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0"
          # Configure with math library support (native build on matched architecture runner)
          ../configure \
            --prefix=/usr \
            --disable-profile \
            --disable-werror \
            --enable-add-ons \
            --without-cvs

          # Compile with all components including math library
          make -j$(nproc) PARALLELMFLAGS="-j$(nproc)"
          make install DESTDIR=$(pwd)/../../output

          cd ../..

          # Verify libm was built
          echo "Checking for libm..."
          find output -name "libm.*" -type f

          # Package
          ARTIFACT_NAME="glibc-${VERSION}-${ARCH}.tar.gz"
          tar czf $ARTIFACT_NAME -C output .
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV

      - name: Compile newlib with libm
        if: inputs.libc_type == 'newlib'
        run: |
          VERSION=${{ inputs.version }}
          ARCH=${{ inputs.target_arch }}

          # Download newlib source (includes libm)
          wget https://sourceware.org/pub/newlib/newlib-${VERSION}.tar.gz
          tar xzf newlib-${VERSION}.tar.gz

          # Configure with libm support (native build on matched architecture runner)
          cd newlib-${VERSION}
          ./configure --prefix=/usr/local \
            --enable-newlib-io-long-long \
            --enable-newlib-register-fp

          # Compile - newlib builds libm automatically
          make -j$(nproc)
          make install DESTDIR=$(pwd)/../output

          cd ..

          # Verify libm
          echo "Checking for libm..."
          find output -name "libm.*" -type f

          # Package
          ARTIFACT_NAME="newlib-${VERSION}-${ARCH}.tar.gz"
          tar czf $ARTIFACT_NAME -C output .
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}
          retention-days: 30

      - name: Create Release
        if: inputs.release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.libc_type }}-v${{ inputs.version }}-${{ inputs.target_arch }}
          name: ${{ inputs.libc_type }} ${{ inputs.version }} (${{ inputs.target_arch }})
          files: ${{ env.ARTIFACT_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Type**: ${{ inputs.libc_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Architecture**: ${{ inputs.target_arch }}" >> $GITHUB_STEP_SUMMARY
          echo "- **OS**: ${{ inputs.target_os }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifact**: ${{ env.ARTIFACT_NAME }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ inputs.libc_type }}" = "glibc" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Dependencies:**" >> $GITHUB_STEP_SUMMARY
          fi
